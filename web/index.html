<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بُوقِلَّةُ يٰسٓ × ١٩ — Bouclier de Yassin</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: #e0d8c0;

          #cosmos {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
          }
      font-family: 'Noto Naskh Arabic', 'Scheherazade New', 'DejaVu Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    #header {
      text-align: center;
      margin-bottom: 18px;
    }

    .basmala {
      font-size: 1.5rem;
      color: #FFD700;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .title {
      font-size: 0.95rem;
      color: #7090b0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #shield-container svg {
      display: block;
      max-width: 100%;
    }

    /* ── Stats bar ────────────────────────────────────────── */
    #stats {
      margin-top: 18px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 60px;
    }

    .stat-value {
      font-size: 1.15rem;
      font-weight: bold;
      color: #c8d8e8;
    }

    .stat-value.gold { color: #FFD700; }
    .stat-value.zero { color: #00cc88; }

    .stat-label {
      font-size: 0.68rem;
      color: #506070;
      text-align: center;
      direction: ltr;
    }

    /* ── Legend ───────────────────────────────────────────── */
    #legend {
      margin-top: 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.73rem;
      color: #8090a0;
      direction: ltr;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Tooltip ──────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      background: rgba(8, 10, 24, 0.96);
      border: 1px solid #2a3d5a;
      border-radius: 10px;
      padding: 13px 16px;
      max-width: 360px;
      z-index: 200;
      transition: opacity 0.12s;
      direction: rtl;
      text-align: right;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    }

    .tt-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      direction: ltr;
    }

    .tt-num-badge {
      background: #1a2a4a;
      border: 1px solid #334466;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 0.78rem;
      color: #8090b0;
      direction: ltr;
    }

    .tt-sig-badge {
      font-size: 0.72rem;
      color: #FFD700;
      background: #2a1a00;
      border: 1px solid #5a4000;
      border-radius: 5px;
      padding: 2px 8px;
      display: none;
    }

    .tt-text {
      font-size: 1.0rem;
      color: #e0d8c0;
      line-height: 1.8;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e2e44;
      word-break: break-word;
    }

    .tt-stats-row {
      display: flex;
      gap: 18px;
      font-size: 0.75rem;
      color: #7090b0;
      direction: ltr;
    }

    .tt-stats-row strong {
      color: #b0c8e0;
    }

    /* ── Hover instruction ────────────────────────────────── */
    #hint {
      margin-top: 10px;
      font-size: 0.7rem;
      color: #354555;
      direction: ltr;
      letter-spacing: 0.05em;
    }

    /* ── Animations Orion ─────────────────────────────────── */
    @keyframes twinkle-fast {
      0%,100% { opacity: 1;    r: 2.6; }
      40%     { opacity: 0.3;  r: 1.8; }
      70%     { opacity: 0.85; r: 2.4; }
    }
    @keyframes twinkle-slow {
      0%,100% { opacity: 0.7;  r: 1.8; }
      50%     { opacity: 1;    r: 2.6; }
    }
    @keyframes twinkle-belt {
      0%,100% { opacity: 1;    r: 3.2; filter: drop-shadow(0 0 3px #b0d8ff); }
      45%     { opacity: 0.45; r: 2.2; filter: drop-shadow(0 0 1px #6090bb); }
    }
    @keyframes twinkle-rigel {
      0%,100% { opacity: 1;    r: 3.8; filter: drop-shadow(0 0 6px #aad4ff); }
      35%     { opacity: 0.5;  r: 2.4; filter: drop-shadow(0 0 2px #4477aa); }
    }
    @keyframes twinkle-betelgeuse {
      0%,100% { opacity: 1;    r: 3.4; filter: drop-shadow(0 0 5px #ffaa60); }
      40%     { opacity: 0.55; r: 2.2; filter: drop-shadow(0 0 2px #aa5520); }
    }
    @keyframes nebula-pulse {
      0%,100% { opacity: 0.18; }
      50%     { opacity: 0.32; }
    }
    @keyframes line-glow {
      0%,100% { opacity: 0.18; }
      50%     { opacity: 0.42; }
    }
    @keyframes core-halo {
      0%,100% { opacity: 0.55; r: 96; }
      50%     { opacity: 0.85; r: 104; }
    }
    @keyframes heart-breathe {
      0%,100% { transform: scale(1.000); filter: drop-shadow(0 0  5px #3a1a6066); }
      45%     { transform: scale(1.040); filter: drop-shadow(0 0 24px #7a3aaa99); }
    }
    @keyframes heart-ripple-a {
      0%   { transform: scale(1.00); opacity: 0.58; stroke: #7c3aed; }
      40%  { stroke: #4f46e5; }
      70%  { opacity: 0.20; stroke: #3730a3; }
      100% { transform: scale(3.70); opacity: 0.00; stroke: #1e1b4b; }
    }
    @keyframes heart-ripple-b {
      0%   { transform: scale(1.00); opacity: 0.58; stroke: #4338ca; }
      40%  { stroke: #6d28d9; }
      70%  { opacity: 0.20; stroke: #7c3aed; }
      100% { transform: scale(3.70); opacity: 0.00; stroke: #4c1d95; }
    }
    .heart-breathe {
      transform-box: fill-box;
      transform-origin: center;
      animation: heart-breathe 5.5s ease-in-out infinite;
    }
    .heart-ripple-1 {
      transform-box: fill-box;
      transform-origin: center;
      animation: heart-ripple-a 11s ease-out infinite;
    }
    .heart-ripple-2 {
      transform-box: fill-box;
      transform-origin: center;
      animation: heart-ripple-b 11s ease-out 5.5s infinite;
    }
    @keyframes orion-rotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .orion-spin {
      transform-origin: 0px 0px;
      animation: orion-rotate 120s linear infinite;
    }
    .star-belt    { animation: twinkle-belt        2.8s ease-in-out infinite; }
    .star-rigel   { animation: twinkle-rigel        3.5s ease-in-out infinite; }
    .star-betelgeuse { animation: twinkle-betelgeuse 4.1s ease-in-out infinite; }
    .star-fast    { animation: twinkle-fast         2.2s ease-in-out infinite; }
    .star-slow    { animation: twinkle-slow         5.0s ease-in-out infinite; }
    .nebula       { animation: nebula-pulse         6.0s ease-in-out infinite; }
    .orion-line   { animation: line-glow            3.0s ease-in-out infinite; }
    .core-halo    { animation: core-halo            4.5s ease-in-out infinite; }
  </style>
</head>
<body>
<canvas id="cosmos"></canvas>

<div id="header">
  <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <div class="title">Bouclier de Yassin × 19 — بُوقِلَّةُ يٰسٓ</div>
</div>

<div id="shield-container"></div>

<div id="stats"></div>

<div id="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#FFD700;border:1px solid #aa8800"></div>
    <span>Verset × 19 (or)</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#0077bb"></div>
    <span>Forte densité ي / س</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#1a2a4a;border:1px solid #334466"></div>
    <span>Faible densité ي / س</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#1a0808;border:1px solid #5a3a1a"></div>
    <span>Noyau central (7 résiduels)</span>
  </div>
</div>

<div id="hint">⟵ Survole un arc ou un cercle pour voir le verset et sa valeur Abjad</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-row-header">
    <span class="tt-num-badge">الآية <span id="tt-num"></span></span>
    <span class="tt-sig-badge" id="tt-sig">★ مضاعف ١٩</span>
  </div>
  <div class="tt-text" id="tt-text"></div>
  <div class="tt-stats-row">
    <span>Abjad : <strong id="tt-abjad"></strong></span>
    <span>ي : <strong id="tt-ya"></strong></span>
    <span>س : <strong id="tt-sin"></strong></span>
    <span>ي+س : <strong id="tt-yasin"></strong></span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  CONFIGURATION GÉOMÉTRIQUE
// ═══════════════════════════════════════════════════════════════════════
const W  = 860, H = 860;
const cx = W / 2, cy = H / 2;

const R_CORE      = 110;   // rayon du noyau central (يس)
const R_ANG_IN    = 122;   // bord intérieur de la couronne des anges
const R_ANG_OUT   = 252;   // bord extérieur de la couronne des anges
const R_VER_IN    = 264;   // bord intérieur de la couronne des versets
const R_VER_OUT   = 394;   // bord extérieur de la couronne des versets

const N_SECTORS   = 19;
const N_VPS       = 4;     // versets par secteur
const SECTOR_GAP  = 0.018; // espacement angulaire entre secteurs (rad)
const VERSE_GAP   = 0.005; // espacement angulaire entre versets (rad)
const OFFSET      = -Math.PI / 2; // départ à 12h

// ═══════════════════════════════════════════════════════════════════════
//  COULEURS
// ═══════════════════════════════════════════════════════════════════════
const C_BG       = "#0a0a1a";
const C_GOLD     = "#FFD700";
const C_SEAL     = "#C0A060";
const C_CORE_BG  = "#110808";
const C_GRID     = "#1a2438";

// ═══════════════════════════════════════════════════════════════════════
//  HELPERS ANGULAIRES
// ═══════════════════════════════════════════════════════════════════════
const sectorSpan = 2 * Math.PI / N_SECTORS;

function sectorAngles(i) {
  const start = OFFSET + i * sectorSpan + SECTOR_GAP / 2;
  const end   = start + sectorSpan - SECTOR_GAP;
  return { start, end };
}

function verseAngles(si, vi) {
  const { start: s0, end: s1 } = sectorAngles(si);
  const usable    = s1 - s0;
  const vSpan     = (usable - (N_VPS - 1) * VERSE_GAP) / N_VPS;
  const vStart    = s0 + vi * (vSpan + VERSE_GAP);
  return { start: vStart, end: vStart + vSpan };
}

const arcGen = d3.arc();

// ═══════════════════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════════════════
const tooltip = d3.select("#tooltip");

function showVerseTooltip(event, v) {
  d3.select("#tt-num").text(v.num);
  d3.select("#tt-text").text(v.text);
  d3.select("#tt-abjad").text(v.abjad.toLocaleString("fr-FR"));
  d3.select("#tt-ya").text(v.ya_count);
  d3.select("#tt-sin").text(v.sin_count);
  d3.select("#tt-yasin").text(v.ya_count + v.sin_count);

  const sig = d3.select("#tt-sig");
  sig.style("display", v.mult_19 ? "inline" : "none");

  positionTooltip(event);
}

function showAngelTooltip(event, sector) {
  const totalYaSin = d3.sum(sector.verses, v => v.ya_count + v.sin_count);
  const totalAbjad = d3.sum(sector.verses, v => v.abjad);
  const nums = sector.verses.map(v => v.num).join(" · ");
  const hasGold = sector.verses.some(v => v.mult_19);

  d3.select("#tt-num").text(`Ange ${sector.angel}`);
  d3.select("#tt-text").text(`Versets : ${nums}`);
  d3.select("#tt-abjad").text(totalAbjad.toLocaleString("fr-FR"));
  d3.select("#tt-ya").text(d3.sum(sector.verses, v => v.ya_count));
  d3.select("#tt-sin").text(d3.sum(sector.verses, v => v.sin_count));
  d3.select("#tt-yasin").text(totalYaSin);
  d3.select("#tt-sig").style("display", hasGold ? "inline" : "none");

  positionTooltip(event);
}

function positionTooltip(event) {
  const TW = 370;
  const x  = event.clientX + 20 + TW > window.innerWidth
              ? event.clientX - TW - 12
              : event.clientX + 20;
  tooltip
    .style("left",  x + "px")
    .style("top",  (event.clientY - 10) + "px")
    .style("opacity", 1);
}

function hideTooltip() {
  tooltip.style("opacity", 0);
}

// ═══════════════════════════════════════════════════════════════════════
//  MAIN — chargement des données
// ═══════════════════════════════════════════════════════════════════════
d3.json("data.json").then(function(data) {

  const { stats, sectors, core } = data;

  // ── Scales couleur ──────────────────────────────────────────────────
  const maxYaVerses  = d3.max(sectors.flatMap(s => s.verses),
                              v => v.ya_count + v.sin_count) || 1;
  const maxYaSectors = d3.max(sectors,
                              s => d3.sum(s.verses, v => v.ya_count + v.sin_count)) || 1;

  const verseColor  = d3.scaleSequential()
    .domain([0, maxYaVerses])
    .interpolator(d3.interpolateRgb("#1a2440", "#0077bb"));

  const angelColor  = d3.scaleSequential()
    .domain([0, maxYaSectors])
    .interpolator(d3.interpolateRgb("#111e36", "#0055aa"));

  // ── SVG ─────────────────────────────────────────────────────────────
  const svg = d3.select("#shield-container")
    .append("svg")
    .attr("width",   W)
    .attr("height",  H)
    .attr("viewBox", `0 0 ${W} ${H}`);

  svg.append("rect")
    .attr("width", W).attr("height", H)
    .attr("fill", C_BG);

  const g = svg.append("g")
    .attr("transform", `translate(${cx},${cy})`);

  // Cercles décoratifs (grille)
  [R_VER_OUT + 10, R_VER_IN  - 5,
   R_ANG_OUT + 5,  R_ANG_IN  - 5,
   R_CORE    + 5].forEach(r => {
    g.append("circle").attr("r", r)
      .attr("fill", "none")
      .attr("stroke", C_GRID)
      .attr("stroke-width", 0.6);
  });

  // ── Lignes radiales (19 séparateurs) ────────────────────────────────
  for (let i = 0; i < N_SECTORS; i++) {
    const a = OFFSET + i * sectorSpan;
    g.append("line")
      .attr("x1", Math.cos(a) * R_ANG_IN)
      .attr("y1", Math.sin(a) * R_ANG_IN)
      .attr("x2", Math.cos(a) * R_VER_OUT)
      .attr("y2", Math.sin(a) * R_VER_OUT)
      .attr("stroke", "#1e2e46")
      .attr("stroke-width", 0.5);
  }

  // ── Couronne des 19 anges ────────────────────────────────────────────
  const angelG = g.append("g").attr("class", "angel-ring");

  sectors.forEach((sector, i) => {
    const { start, end } = sectorAngles(i);
    const sYaSin  = d3.sum(sector.verses, v => v.ya_count + v.sin_count);
    const hasGold = sector.verses.some(v => v.mult_19);

    const path = angelG.append("path")
      .datum(sector)
      .attr("d", arcGen({ innerRadius: R_ANG_IN, outerRadius: R_ANG_OUT,
                          startAngle: start, endAngle: end }))
      .attr("fill",         hasGold ? "#2e1e00" : angelColor(sYaSin))
      .attr("stroke",       hasGold ? "#6a5010" : "#243050")
      .attr("stroke-width", hasGold ? 0.9 : 0.4)
      .attr("opacity",      0.85)
      .style("cursor",      "pointer");

    // Label numéro d'ange
    const midA = (start + end) / 2;
    const lr   = (R_ANG_IN + R_ANG_OUT) / 2;
    g.append("text")
      .attr("x", Math.cos(midA) * lr)
      .attr("y", Math.sin(midA) * lr)
      .attr("text-anchor",        "middle")
      .attr("dominant-baseline",  "central")
      .attr("fill",       hasGold ? C_GOLD : "#5a7898")
      .attr("font-size",  "11px")
      .attr("font-weight", hasGold ? "bold" : "normal")
      .attr("pointer-events", "none")
      .text(sector.angel);

    path
      .on("mousemove",  (ev) => {
        path.attr("opacity", 1)
            .attr("stroke-width", hasGold ? 1.5 : 1)
            .attr("fill", hasGold ? "#4a3200" : "#1a3a6a");
        showAngelTooltip(ev, sector);
      })
      .on("mouseleave", () => {
        path.attr("opacity",      0.85)
            .attr("stroke-width", hasGold ? 0.9 : 0.4)
            .attr("fill",         hasGold ? "#2e1e00" : angelColor(sYaSin));
        hideTooltip();
      });
  });

  // ── Couronne des 76 versets ──────────────────────────────────────────
  const verseG = g.append("g").attr("class", "verse-ring");

  sectors.forEach((sector, si) => {
    sector.verses.forEach((verse, vi) => {
      const { start, end } = verseAngles(si, vi);
      const yasin   = verse.ya_count + verse.sin_count;
      const fillCol = verse.mult_19 ? C_GOLD : verseColor(yasin);

      const path = verseG.append("path")
        .datum(verse)
        .attr("d", arcGen({ innerRadius: R_VER_IN, outerRadius: R_VER_OUT,
                            startAngle: start, endAngle: end }))
        .attr("fill",         fillCol)
        .attr("stroke",       verse.mult_19 ? "#aa8800" : "#1e2e46")
        .attr("stroke-width", verse.mult_19 ? 0.8 : 0.3)
        .attr("opacity",      verse.mult_19 ? 0.92 : 0.78)
        .style("cursor",      "pointer");

      // Numéro de verset (label extérieur)
      const midA = (start + end) / 2;
      const lr   = R_VER_OUT + 13;
      g.append("text")
        .attr("x", Math.cos(midA) * lr)
        .attr("y", Math.sin(midA) * lr)
        .attr("text-anchor",       "middle")
        .attr("dominant-baseline", "central")
        .attr("fill",      verse.mult_19 ? C_GOLD : "#3a5060")
        .attr("font-size", "6.5px")
        .attr("pointer-events", "none")
        .text(verse.num);

      path
        .on("mousemove",  (ev) => {
          path.attr("opacity", 1)
              .attr("fill",    verse.mult_19 ? "#ffe060" : "#3399dd")
              .attr("stroke-width", 1.2);
          showVerseTooltip(ev, verse);
        })
        .on("mouseleave", () => {
          path.attr("opacity",      verse.mult_19 ? 0.92 : 0.78)
              .attr("fill",         fillCol)
              .attr("stroke-width", verse.mult_19 ? 0.8 : 0.3);
          hideTooltip();
        });
    });
  });

  // ── Noyau central ─────────────────────────────────────────────────────
  // Dégradés et filtres pour la nébuleuse
  const defs = svg.append("defs");

  // Halo radial du noyau
  const coreGrad = defs.append("radialGradient")
    .attr("id", "coreGrad").attr("cx","50%").attr("cy","50%").attr("r","50%");
  coreGrad.append("stop").attr("offset","0%")  .attr("stop-color","#1a0c2e").attr("stop-opacity",1);
  coreGrad.append("stop").attr("offset","55%") .attr("stop-color","#0d0818").attr("stop-opacity",1);
  coreGrad.append("stop").attr("offset","100%").attr("stop-color","#070510").attr("stop-opacity",1);

  // Nébuleuse bleue (patch diffus)
  const nebGrad = defs.append("radialGradient")
    .attr("id","nebGrad").attr("cx","50%").attr("cy","50%").attr("r","50%");
  nebGrad.append("stop").attr("offset","0%")  .attr("stop-color","#204880").attr("stop-opacity",0.7);
  nebGrad.append("stop").attr("offset","60%") .attr("stop-color","#102040").attr("stop-opacity",0.3);
  nebGrad.append("stop").attr("offset","100%").attr("stop-color","#050a18").attr("stop-opacity",0);

  // Nébuleuse orange Betelgeuse
  const nebOrange = defs.append("radialGradient")
    .attr("id","nebOrange").attr("cx","50%").attr("cy","50%").attr("r","50%");
  nebOrange.append("stop").attr("offset","0%")  .attr("stop-color","#803010").attr("stop-opacity",0.55);
  nebOrange.append("stop").attr("offset","100%").attr("stop-color","#200800").attr("stop-opacity",0);

  // Ondes de respiration (expandent vers l'extérieur, couleur alternée)
  g.append("circle")
    .attr("r", R_CORE)
    .attr("fill", "none")
    .attr("stroke-width", 2.0)
    .attr("class", "heart-ripple-1");
  g.append("circle")
    .attr("r", R_CORE)
    .attr("fill", "none")
    .attr("stroke-width", 2.0)
    .attr("class", "heart-ripple-2");

  // Fond du noyau (respire)
  g.append("circle")
    .attr("r",    R_CORE)
    .attr("fill", "url(#coreGrad)")
    .attr("stroke",       "#3a2050")
    .attr("stroke-width", 1.0)
    .attr("class", "heart-breathe");

  // Halo animé
  g.append("circle")
    .attr("class", "core-halo")
    .attr("r",    96)
    .attr("fill", "none")
    .attr("stroke",       "#4a2a7a")
    .attr("stroke-width", 0.8)
    .attr("opacity",      0.55);

  // ── Constellation Orion animée (rotation lente infinie) ──────────────
  // Groupe rotatif centré sur 0,0
  const orion = g.append("g").attr("class", "orion-spin");

  // Coordonnées Orion (échelle ~48px, centrées)
  // Étoiles : [id, x, y, r, classe, couleur, nom]
  const stars = [
    // Ceinture (bleu-blanc)
    { id:"mintaka",    x:  20,  y: -2,  r:3.2, cls:"star-belt",        col:"#c8e4ff", name:"Mintaka"    },
    { id:"alnilam",    x:   0,  y:  6,  r:3.2, cls:"star-belt",        col:"#d4eaff", name:"Alnilam"    },
    { id:"alnitak",    x: -20,  y: 14,  r:3.2, cls:"star-belt",        col:"#c0dcff", name:"Alnitak"    },
    // Épaules
    { id:"betelgeuse", x: -36,  y:-30,  r:3.4, cls:"star-betelgeuse",  col:"#ffaa60", name:"Betelgeuse" },
    { id:"bellatrix",  x:  34,  y:-22,  r:2.6, cls:"star-fast",        col:"#c8d8ff", name:"Bellatrix"  },
    // Pieds
    { id:"rigel",      x:  36,  y: 40,  r:3.8, cls:"star-rigel",       col:"#aad4ff", name:"Rigel"      },
    { id:"saiph",      x: -28,  y: 44,  r:2.6, cls:"star-fast",        col:"#b8ccff", name:"Saiph"      },
    // Tête
    { id:"meissa",     x:  -4,  y:-52,  r:2.2, cls:"star-slow",        col:"#e0eaff", name:"Meissa"     },
    // Étoiles secondaires (épée)
    { id:"s1",         x:   8,  y: 20,  r:1.4, cls:"star-slow",        col:"#9ab0d8", name:""           },
    { id:"s2",         x:   4,  y: 26,  r:1.2, cls:"star-fast",        col:"#8aa4cc", name:""           },
    { id:"s3",         x:  10,  y: 32,  r:1.3, cls:"star-slow",        col:"#9ab8e0", name:""           },
  ];

  // Lignes de la constellation
  const lines = [
    ["meissa",    "betelgeuse"],
    ["meissa",    "bellatrix"],
    ["betelgeuse","mintaka"],
    ["bellatrix", "mintaka"],
    ["mintaka",   "alnilam"],
    ["alnilam",   "alnitak"],
    ["alnitak",   "saiph"],
    ["mintaka",   "rigel"],
    ["alnilam",   "s1"],
    ["s1",        "s2"],
    ["s2",        "s3"],
  ];

  // Index des étoiles par id
  const starMap = Object.fromEntries(stars.map(s => [s.id, s]));

  // Nébuleuse diffuse autour de Rigel
  orion.append("ellipse")
    .attr("class", "nebula")
    .attr("cx", 34).attr("cy", 40)
    .attr("rx", 22).attr("ry", 16)
    .attr("fill", "url(#nebGrad)");

  // Nébuleuse diffuse autour de Betelgeuse
  orion.append("ellipse")
    .attr("class", "nebula")
    .attr("cx", -34).attr("cy", -28)
    .attr("rx", 20).attr("ry", 18)
    .attr("fill", "url(#nebOrange)")
    .style("animation-delay", "2s");

  // Nébuleuse de l'épée (zone M42)
  orion.append("ellipse")
    .attr("class", "nebula")
    .attr("cx", 7).attr("cy", 26)
    .attr("rx", 12).attr("ry", 10)
    .attr("fill", "url(#nebGrad)")
    .style("animation-delay", "1s");

  // Tracé des lignes
  lines.forEach(([a, b], i) => {
    const sa = starMap[a], sb = starMap[b];
    orion.append("line")
      .attr("class", "orion-line")
      .attr("x1", sa.x).attr("y1", sa.y)
      .attr("x2", sb.x).attr("y2", sb.y)
      .attr("stroke",       "#6090c8")
      .attr("stroke-width", 0.7)
      .style("animation-delay", `${i * 0.25}s`);
  });

  // Dessin des étoiles
  stars.forEach((s, i) => {
    // Halo lumineux
    orion.append("circle")
      .attr("cx", s.x).attr("cy", s.y)
      .attr("r",  s.r + 3)
      .attr("fill", s.col)
      .attr("opacity", 0.12)
      .attr("pointer-events", "none")
      .style("animation", `twinkle-fast ${2.5 + i * 0.3}s ease-in-out infinite`);

    // Étoile principale
    orion.append("circle")
      .attr("class", s.cls)
      .attr("cx", s.x).attr("cy", s.y)
      .attr("r",  s.r)
      .attr("fill", s.col)
      .style("animation-delay", `${i * 0.4}s`);
  });

  // Cercle ornemental (par-dessus Orion)
  g.append("circle")
    .attr("r",  R_CORE - 14)
    .attr("fill",             "none")
    .attr("stroke",           "#2a1840")
    .attr("stroke-width",     0.6)
    .attr("stroke-dasharray", "3,3");

  // يس — sceau central
  g.append("text")
    .attr("y",                 -26)
    .attr("text-anchor",       "middle")
    .attr("dominant-baseline", "central")
    .attr("fill",      C_SEAL)
    .attr("font-size", "34px")
    .attr("font-weight", "bold")
    .attr("pointer-events", "none")
    .text("يس");

  // ── Nom du porteur — celui que le bouclier protège ──────────────────
  // Halo lumineux derrière le nom
  g.append("text")
    .attr("y",                 6)
    .attr("text-anchor",       "middle")
    .attr("dominant-baseline", "central")
    .attr("fill",              "none")
    .attr("stroke",            "#FFD700")
    .attr("stroke-width",      6)
    .attr("stroke-opacity",    0.12)
    .attr("font-size",         "17px")
    .attr("font-weight",       "bold")
    .attr("pointer-events",    "none")
    .text("عُثْمَان");

  // Nom principal
  g.append("text")
    .attr("y",                 6)
    .attr("text-anchor",       "middle")
    .attr("dominant-baseline", "central")
    .attr("fill",              "#e8d8b0")
    .attr("font-size",         "17px")
    .attr("font-weight",       "bold")
    .attr("pointer-events",    "none")
    .text("عُثْمَان");

  // Lignes décoratives de part et d'autre du nom
  [[-38, -14], [14, 38]].forEach(([x1, x2]) => {
    g.append("line")
      .attr("x1", x1).attr("y1", 6)
      .attr("x2", x2).attr("y2", 6)
      .attr("stroke",       "#8a7040")
      .attr("stroke-width", 0.8)
      .attr("opacity",      0.6);
  });

  // Sous-titre "سورة ٣٦"
  g.append("text")
    .attr("y",                 24)
    .attr("text-anchor",       "middle")
    .attr("dominant-baseline", "central")
    .attr("fill",      "#6a5030")
    .attr("font-size", "8px")
    .attr("pointer-events", "none")
    .text("سورة ٣٦  ·  بِإِذْنِ اللَّهِ");

  // 7 versets résiduels en cercle dans le noyau
  const coreR = 68;
  core.forEach((verse, i) => {
    const angle = OFFSET + (i / core.length) * 2 * Math.PI;
    const x = Math.cos(angle) * coreR;
    const y = Math.sin(angle) * coreR;
    const color = verse.mult_19 ? C_GOLD : "#5a7080";

    g.append("circle")
      .attr("cx", x).attr("cy", y).attr("r", 15)
      .attr("fill",         verse.mult_19 ? "#2a1800" : "#0e1a26")
      .attr("stroke",       color)
      .attr("stroke-width", verse.mult_19 ? 1.0 : 0.6)
      .style("cursor",      "pointer")
      .on("mousemove",  (ev) => showVerseTooltip(ev, verse))
      .on("mouseleave", hideTooltip);

    g.append("text")
      .attr("x", x).attr("y", y)
      .attr("text-anchor",       "middle")
      .attr("dominant-baseline", "central")
      .attr("fill",      color)
      .attr("font-size", "8.5px")
      .attr("pointer-events", "none")
      .text(verse.num);
  });

  // ── Barre de stats ────────────────────────────────────────────────────
  const statsDiv = d3.select("#stats");

  const items = [
    { label: "Versets",       value: stats.total_verses },
    { label: "Abjad total",   value: stats.total_abjad.toLocaleString("fr-FR") },
    { label: "mod 19",        value: stats.total_abjad_mod19,
      cls: stats.total_abjad_mod19 === 0 ? "zero" : "" },
    { label: "Total ي",       value: stats.total_ya },
    { label: "Total س",       value: stats.total_sin },
    { label: "ي + س",         value: stats.total_ya_sin },
    { label: "ي+س mod 19",    value: stats.ya_sin_mod19,
      cls: stats.ya_sin_mod19 === 0 ? "zero" : "" },
    { label: "Versets × 19",  value: stats.count_mult_19, cls: "gold" },
  ];

  items.forEach(item => {
    statsDiv.append("div")
      .attr("class", "stat-item")
      .html(
        `<div class="stat-value ${item.cls || ''}">${item.value}</div>
         <div class="stat-label">${item.label}</div>`
      );
  });

}).catch(err => {
  document.getElementById("shield-container").innerHTML = `
    <div style="
      color:#ff7777; padding:40px; text-align:center;
      font-family:monospace; font-size:0.9rem; line-height:2;
    ">
      <div style="font-size:1.5rem;margin-bottom:12px">⚠</div>
      <strong>Impossible de charger data.json</strong><br>
      Lance un serveur local depuis la racine du projet :<br><br>
      <code style="background:#111;padding:6px 14px;border-radius:5px;color:#FFD700;">
        python3 -m http.server 8000 --directory web
      </code><br><br>
      Puis ouvre →
      <a href="http://localhost:8000" style="color:#4499ff">http://localhost:8000</a>
    </div>`;
});
</script>

<!-- ══════════════════════════════════════════════════════════
     COSMOS BACKGROUND
══════════════════════════════════════════════════════════ -->
<script>
(function() {
  const canvas = document.getElementById('cosmos');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Étoiles ──────────────────────────────────────────────────────────
  const PALETTE = [
    'rgba(200,212,255,',
    'rgba(255,248,220,',
    'rgba(170,220,255,',
    'rgba(255,200,180,',
    'rgba(220,255,230,',
  ];
  const STARS = Array.from({length: 320}, () => ({
    x:     Math.random(),
    y:     Math.random(),
    r:     Math.random() * 1.8 + 0.18,
    phase: Math.random() * Math.PI * 2,
    freq:  0.00045 + Math.random() * 0.0014,
    bri:   0.28 + Math.random() * 0.72,
    col:   PALETTE[Math.floor(Math.random() * PALETTE.length)],
  }));

  // ── Pleine Lune (haut-gauche) ─────────────────────────────────────────
  const MOON_REL = { x: 0.095, y: 0.095, r: 68 };
  const CRATERS  = [
    { dx: -22, dy: -15, r: 11 },
    { dx:  13, dy:  11, r:  8 },
    { dx:  -7, dy:  24, r:  7 },
    { dx:  24, dy: -21, r:  6 },
    { dx: -27, dy:  13, r:  5 },
    { dx:   5, dy: -27, r:  6 },
    { dx:  32, dy:   6, r:  4 },
    { dx: -13, dy: -30, r:  4 },
    { dx:  18, dy:  28, r:  3 },
  ];

  function drawMoon() {
    const w = canvas.width, h = canvas.height;
    const mx = MOON_REL.x * w;
    const my = MOON_REL.y * h;
    const r  = MOON_REL.r;

    const halo = ctx.createRadialGradient(mx, my, r * 0.85, mx, my, r * 3.2);
    halo.addColorStop(0,    'rgba(255,252,230,0.16)');
    halo.addColorStop(0.35, 'rgba(220,215,190,0.05)');
    halo.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(mx, my, r * 3.2, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    const inner = ctx.createRadialGradient(mx, my, r * 0.95, mx, my, r * 1.5);
    inner.addColorStop(0,   'rgba(255,250,230,0.22)');
    inner.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(mx, my, r * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = inner;
    ctx.fill();

    const surf = ctx.createRadialGradient(mx - r*0.30, my - r*0.30, r*0.04, mx, my, r);
    surf.addColorStop(0,    '#faf7ef');
    surf.addColorStop(0.50, '#eee5d2');
    surf.addColorStop(0.82, '#ddd0bb');
    surf.addColorStop(1,    '#bcb0a0');
    ctx.beginPath();
    ctx.arc(mx, my, r, 0, Math.PI * 2);
    ctx.fillStyle = surf;
    ctx.fill();

    CRATERS.forEach(c => {
      const cg = ctx.createRadialGradient(
        mx + c.dx - c.r*0.25, my + c.dy - c.r*0.25, 0,
        mx + c.dx, my + c.dy, c.r
      );
      cg.addColorStop(0,   'rgba(75,65,50,0.48)');
      cg.addColorStop(0.6, 'rgba(115,105,85,0.20)');
      cg.addColorStop(1,   'rgba(155,145,120,0.04)');
      ctx.beginPath();
      ctx.arc(mx + c.dx, my + c.dy, c.r, 0, Math.PI * 2);
      ctx.fillStyle = cg;
      ctx.fill();
    });
  }

  // ── Nébuleuses de fond ────────────────────────────────────────────────
  const NEBULAE = [
    { x: 0.82, y: 0.14, rx: 180, ry:  90, a: -0.35, col: '60,25,110',  op: 0.16 },
    { x: 0.07, y: 0.82, rx: 220, ry: 110, a:  0.45, col: '15,45,105',  op: 0.13 },
    { x: 0.88, y: 0.78, rx: 150, ry:  75, a: -0.65, col: '90,20,65',   op: 0.11 },
    { x: 0.50, y: 0.04, rx: 300, ry:  50, a:  0.10, col: '30,15,80',   op: 0.09 },
  ];

  function drawNebulae() {
    const w = canvas.width, h = canvas.height;
    NEBULAE.forEach(n => {
      ctx.save();
      ctx.translate(n.x * w, n.y * h);
      ctx.rotate(n.a);
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, n.rx);
      grd.addColorStop(0,   `rgba(${n.col},${n.op})`);
      grd.addColorStop(0.5, `rgba(${n.col},${(n.op * 0.35).toFixed(3)})`);
      grd.addColorStop(1,   `rgba(${n.col},0)`);
      ctx.scale(1, n.ry / n.rx);
      ctx.beginPath();
      ctx.arc(0, 0, n.rx, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.restore();
    });
  }

  // ── Nuages ────────────────────────────────────────────────────────────
  function mkCloud(distribute) {
    const dir = Math.random() > 0.5 ? 1 : -1;
    return {
      x:   distribute ? Math.random() : (dir > 0 ? -0.30 : 1.30),
      y:   0.03 + Math.random() * 0.94,
      spd: (0.000018 + Math.random() * 0.000045) * dir,
      sc:  0.7 + Math.random() * 1.4,
      op:  0.038 + Math.random() * 0.075,
      puffs: Array.from({ length: 6 + Math.floor(Math.random() * 6) }, () => ({
        dx: (Math.random() - 0.5) * 220,
        dy: (Math.random() - 0.5) * 65,
        r:  32 + Math.random() * 65,
      }))
    };
  }
  const CLOUDS = Array.from({ length: 9 }, () => mkCloud(true));

  function drawCloud(c) {
    const w = canvas.width, h = canvas.height;
    ctx.save();
    ctx.globalAlpha = c.op;
    ctx.translate(c.x * w, c.y * h);
    ctx.scale(c.sc, c.sc * 0.42);
    c.puffs.forEach(p => {
      const gr = ctx.createRadialGradient(p.dx, p.dy, 0, p.dx, p.dy, p.r);
      gr.addColorStop(0,   'rgba(175,188,225,0.65)');
      gr.addColorStop(0.5, 'rgba(140,155,205,0.22)');
      gr.addColorStop(1,   'rgba(90,105,160,0)');
      ctx.beginPath();
      ctx.arc(p.dx, p.dy, p.r, 0, Math.PI * 2);
      ctx.fillStyle = gr;
      ctx.fill();
    });
    ctx.restore();
  }

  // ── Étoiles filantes ──────────────────────────────────────────────────
  const SHOOTS = [];
  function maybeShoot() {
    if (Math.random() < 0.0022) {
      const a  = (Math.random() * 0.55 + 0.12) * Math.PI;
      const sp = 3.5 + Math.random() * 5;
      SHOOTS.push({
        x: Math.random() * 0.85, y: Math.random() * 0.35,
        vx: Math.cos(a) * sp,   vy: Math.sin(a) * sp,
        len: 90 + Math.random() * 130,
        alp: 1.0,
      });
    }
  }

  function drawShoots(dt) {
    const w = canvas.width, h = canvas.height;
    for (let i = SHOOTS.length - 1; i >= 0; i--) {
      const s = SHOOTS[i];
      s.x  += s.vx * dt * 0.055;
      s.y  += s.vy * dt * 0.055;
      s.alp -= 0.011 * (dt / 16);
      if (s.alp <= 0 || s.x > 1.15 || s.y > 1.15) { SHOOTS.splice(i, 1); continue; }
      const sx = s.x*w, sy = s.y*h;
      const mag = Math.hypot(s.vx, s.vy);
      const ex  = sx - (s.vx/mag)*s.len, ey = sy - (s.vy/mag)*s.len;
      const gr  = ctx.createLinearGradient(sx, sy, ex, ey);
      gr.addColorStop(0,    `rgba(255,255,255,${s.alp.toFixed(3)})`);
      gr.addColorStop(0.25, `rgba(190,210,255,${(s.alp*0.55).toFixed(3)})`);
      gr.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      ctx.strokeStyle = gr; ctx.lineWidth = 1.6; ctx.stroke();
    }
  }

  // ── Boucle principale ─────────────────────────────────────────────────
  let last = 0;
  function frame(t) {
    const dt = Math.min(t - last, 80);
    last = t;
    const w = canvas.width, h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const bg = ctx.createRadialGradient(w*0.5, h*0.38, 0, w*0.5, h*0.5, Math.max(w,h)*0.95);
    bg.addColorStop(0,    '#141228');
    bg.addColorStop(0.55, '#0a0a1a');
    bg.addColorStop(1,    '#040310');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    drawNebulae();

    STARS.forEach(s => {
      const op = s.bri * (0.42 + 0.58 * Math.sin(t * s.freq + s.phase));
      ctx.beginPath();
      ctx.arc(s.x*w, s.y*h, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.col + op.toFixed(3) + ')';
      ctx.fill();
      if (s.r > 1.25 && op > 0.78) {
        const f = s.r * 3.0, x = s.x*w, y = s.y*h;
        ctx.globalAlpha = op * 0.32;
        ctx.strokeStyle = s.col + '1)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(x-f,y); ctx.lineTo(x+f,y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,y-f); ctx.lineTo(x,y+f); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    });

    drawMoon();

    CLOUDS.forEach(c => {
      c.x += c.spd * dt;
      if (c.spd > 0 && c.x >  1.32) { c.x = -0.32; c.y = 0.03 + Math.random()*0.94; }
      if (c.spd < 0 && c.x < -0.32) { c.x =  1.32; c.y = 0.03 + Math.random()*0.94; }
      drawCloud(c);
    });

    maybeShoot();
    drawShoots(dt);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
